name: dreamloop
description: "A shared AI dream adventure for long-distance relationships"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.3.0

  # Navigation
  go_router: ^14.8.1

  # Utilities
  uuid: ^4.5.1
  share_plus: ^10.1.4
  flutter_dotenv: ^5.2.1
  home_widget: ^0.7.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  google_sign_in_web: ^0.12.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
